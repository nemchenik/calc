<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DomCraft — Каталог проектов домов</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container hero__inner">
        <div>
          <p class="eyebrow">Каталог готовых решений</p>
          <h1>Современные проекты домов для вашей семьи</h1>
          <p class="hero__text">
            Подберите дом по площади, бюджету и количеству спален. На странице каждого проекта
            доступны варианты комплектации: Базовая, Комфорт и Премиум.
          </p>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="filters card">
        <h2>Фильтр</h2>
        <form id="filtersForm" class="filters__grid">
          <label>
            Площадь от, м²
            <input type="number" id="minArea" min="30" max="500" placeholder="например, 80" />
          </label>
          <label>
            Площадь до, м²
            <input type="number" id="maxArea" min="30" max="500" placeholder="например, 220" />
          </label>
          <label>
            Спален
            <select id="bedrooms">
              <option value="">Любое</option>
              <option value="1">1+</option>
              <option value="2">2+</option>
              <option value="3">3+</option>
              <option value="4">4+</option>
            </select>
          </label>
          <label>
            Этажей
            <select id="floors">
              <option value="">Любое</option>
              <option value="1">1</option>
              <option value="2">2</option>
            </select>
          </label>
          <label>
            Максимальный бюджет, ₽
            <input type="number" id="maxPrice" min="1000000" step="100000" placeholder="например, 12000000" />
          </label>
          <label>
            Материал
            <select id="material">
              <option value="">Любой</option>
              <option value="Газобетон">Газобетон</option>
              <option value="Кирпич">Кирпич</option>
              <option value="Клееный брус">Клееный брус</option>
              <option value="Каркас">Каркас</option>
            </select>
          </label>
        </form>
        <div class="filters__actions">
          <button id="applyFilters" class="btn btn--primary" type="button">Применить</button>
          <button id="resetFilters" class="btn" type="button">Сбросить</button>
        </div>
      </section>

      <section>
        <div class="section-head">
          <h2>Проекты домов</h2>
          <p id="resultsCount"></p>
        </div>
        <div id="catalog" class="catalog-grid"></div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <p>© 2026 DomCraft. Каталог демонстрационных проектов.</p>
      </div>
    </footer>

    <script src="projects.js"></script>
    <script src="index.js"></script>
  </body>
</html>
